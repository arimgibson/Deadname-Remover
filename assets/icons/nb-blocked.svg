<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <clipPath id="circleClip">
      <circle cx="64" cy="64" r="64" />
    </clipPath>
  </defs>

  <circle cx="64" cy="64" r="64" fill="#FFFFFF" />

  <g clip-path="url(#circleClip)">
    <rect x="0" y="0" width="128" height="32" fill="#FFF430" />
    <rect x="0" y="32" width="128" height="32" fill="#FFFFFF" />
    <rect x="0" y="64" width="128" height="32" fill="#9C59D1" />
    <rect x="0" y="96" width="128" height="32" fill="#2C2C2C" />
  </g>

  <g>
    <!-- Red badge circle -->
    <circle cx="96" cy="96" r="22" fill="#E53935" />

    <!-- White "X" -->
    <line x1="88" y1="88" x2="104" y2="104"
          stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
    <line x1="104" y1="88" x2="88" y2="104"
          stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" />
  </g>


  <g>
    <!-- Red badge circle -->
    <circle cx="92" cy="92" r="36" fill="#E53935" />

    <!-- White "X" -->
    <line x1="72" y1="72" x2="112" y2="112"
          stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" />
    <line x1="112" y1="72" x2="72" y2="112"
          stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" />
  </g>
</svg>
